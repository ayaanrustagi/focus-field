<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Focus Field — blocked</title>
  <style>
    :root {
      --indigo: #4338ca;
      --ink: #1e1b4b;
      --paper: #eef2ff;
      --soft: #6366f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--ink);
      font-family: "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      text-align: center;
      background: white;
      border: 1px solid #c7d2fe;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 12px 40px rgba(67, 56, 202, 0.08);
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 12px;
    }
    h1 {
      font-size: 28px;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }
    p {
      color: #4c1d95;
      opacity: 0.85;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    a {
      display: inline-block;
      background: var(--indigo);
      color: white;
      text-decoration: none;
      font-weight: 700;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">focus field</p>
    <h1>Stay in the field.</h1>
    <p>This site is blocked while your focus session is active (or always-on blocking is enabled).</p>
    <a href="https://www.google.com/">Back to work</a>
  </div>
</body>
</html>
