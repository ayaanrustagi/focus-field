<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Schibsted+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1400px;height:560px;overflow:hidden;font-family:"Schibsted Grotesk",system-ui,sans-serif}
  .wrap{width:1400px;height:560px;background:#eef2ff;display:flex;align-items:center;
    padding:0 90px;position:relative;border-left:16px solid #1e1b4b}
  h1{font-family:"Instrument Serif",Georgia,serif;font-weight:400;font-size:88px;line-height:.92;
    letter-spacing:-.03em;color:#1e1b4b;max-width:820px}
  h1 em{font-style:italic;color:#4338ca}
  p{margin-top:22px;font-size:22px;font-weight:600;color:#4338ca;max-width:520px;line-height:1.4}
  .pill{display:inline-flex;margin-top:28px;background:#4338ca;color:#fff;border:2px solid #1e1b4b;
    border-radius:999px;padding:14px 26px;font-weight:900;font-size:16px;box-shadow:4px 4px 0 #1e1b4b}
  .orb{position:absolute;right:100px;top:50%;transform:translateY(-50%);width:220px;height:220px;
    border-radius:50%;background:conic-gradient(from 200deg,#4338ca,#818cf8,#c7d2fe,#4338ca);
    border:3px solid #1e1b4b;box-shadow:8px 8px 0 #1e1b4b;display:grid;place-items:center}
  .orb span{background:#eef2ff;width:120px;height:120px;border-radius:50%;border:2px solid #1e1b4b;
    display:grid;place-items:center;font-weight:900;font-size:28px;color:#1e1b4b}
</style></head>
<body>
<div class="wrap">
  <div>
    <h1>Stay in the <em>field</em>.</h1>
    <p>Block noise. Run real Pomodoros. Optional local timelapse.</p>
    <div class="pill">Focus Field · free on Chrome</div>
  </div>
  <div class="orb"><span>25:00</span></div>
</div>
</body></html>
