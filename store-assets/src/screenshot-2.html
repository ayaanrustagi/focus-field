<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Schibsted+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1280px;height:800px;overflow:hidden;font-family:"Schibsted Grotesk",system-ui,sans-serif;
    background:#eef2ff;color:#1e1b4b}
  .page{width:1280px;height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 30%,#c7d2fe 0%,#eef2ff 55%)}
  .card{width:560px;background:#fff;border:2px solid #1e1b4b;border-radius:20px;padding:48px 44px;
    box-shadow:8px 8px 0 #1e1b4b;text-align:center}
  .mark{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
    color:#4338ca;border:1.5px solid #4338ca;border-radius:999px;padding:6px 12px;margin-bottom:18px}
  h1{font-family:"Instrument Serif",Georgia,serif;font-weight:400;font-size:48px;line-height:1;margin-bottom:14px}
  p{font-size:16px;line-height:1.5;color:#4338ca;opacity:.9;margin-bottom:24px}
  .hosts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:28px}
  .hosts span{background:#eef2ff;border:1.5px solid #c7d2fe;border-radius:999px;padding:8px 14px;
    font-size:13px;font-weight:700}
  .btn{display:inline-block;background:#4338ca;color:#fff;border:1.5px solid #1e1b4b;border-radius:999px;
    padding:14px 28px;font-weight:800;font-size:14px}
  .foot{margin-top:18px;font-size:12px;opacity:.65}
</style></head>
<body>
<div class="page">
  <div class="card">
    <div class="mark">blocked · focus live</div>
    <h1>Outside the field.</h1>
    <p>This site is on your Focus Field list. Finish the session — or take a break when the timer ends.</p>
    <div class="hosts">
      <span>youtube.com</span><span>x.com</span><span>reddit.com</span><span>instagram.com</span>
    </div>
    <div class="btn">Back to work · 18:04 left</div>
    <div class="foot">Focus Field · local blocklist · no cloud</div>
  </div>
</div>
</body></html>
